<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>자바스크립트 기초 활용 - 변수와 함수</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/var2.css">
    <script src="./scripts/var2.js" defer></script>
</head>
<body>
    <form action="#" method="get" id="frm1">
        <button type="button" id="minus_btn" onclick="numValMinus()">-</button>
        <input type="number" name="num" id="num" value="1">
        <button type="button" id="plus_btn" onclick="numValPlus()">+</button>
    </form>
    <!-- 에어비엔비 게스트 추가 클론코딩 -->
    <form action="#" method="get" id="airbnb_frm">
        <div class="total_guest">
            <h2>여행자</h2>
            <p><span>게스트</span><em>추가</em></p>
        </div>
        <ul class="form_guest">
            <li>
                <h2>성인</h2>
                <p>13세 이상</p>
                <div class="num_box">
                    <button type="button" id="adult_minus_btn" onclick="adultMinusFunc()">-</button>
                    <span class="adult_num">0</span>
                    <button type="button" id="adult_plus_btn" onclick="adultPlusFunc()">+</button>
                </div>
            </li>
            <li>
                <h2>어린이</h2>
                <p>2~12세</p>
                <div class="num_box">
                    <button type="button" id="child_minus_btn" onclick="childMinusFunc()">-</button>
                    <span class="child_num">0</span>
                    <button type="button" id="child_plus_btn" onclick="childPlusFunc()">+</button>
                </div>
            </li>
        </ul>
    </form>
</body>
</html>
